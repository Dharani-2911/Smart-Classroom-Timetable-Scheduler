<!DOCTYPE html>
<html>
<head>
<title>Student Login - Smart Classroom</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box student-login">
    <h2>👨‍🎓 Student Portal</h2>
    <p style="color: white; margin-bottom: 20px;">Login to access your timetable and attendance</p>
    
    <input type="text" id="roll_number" placeholder="Roll Number"><br>
    <input type="password" id="student_password" placeholder="Password"><br>
    
    <button onclick="studentLogin()" class="student-btn">Login</button>
    
    <div style="margin-top: 20px;">
        <a href="login.html" style="color: white; text-decoration: underline; font-size: 14px;">Admin Login?</a>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
